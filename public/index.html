<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Brooklyn Nine-Nine - Projeto Prático</title>
  </head>
  <body>
    <header
      class="py-3 border-bottom border-warning border-3"
      style="background-color: #002147"
    >
      <div
        class="container d-flex flex-wrap align-items-center justify-content-between"
      >
        <img src="imgs/Brooklyn_Nine-Nine_Logo.png" width="130" alt="logo" />

        <ul class="nav">
          <li class="nav-item">
            <a href="index.html" class="nav-link text-white fw-bold px-3"
              >Home-Page</a
            >
          </li>
        </ul>
      </div>
    </header>

    <main id="container-home" class="container my-5">
      <section class="mb-5">
        <h3 class="fw-bold mb-4 border-start border-warning border-4 ps-2">
          Itens em Destaque (entidade principal)
        </h3>
        <div
          id="carouselDestaques"
          class="carousel slide shadow"
          data-bs-ride="carousel"
        >
          <div class="carousel-inner" id="carrosel-destaques"></div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselDestaques"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselDestaques"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
          </button>
        </div>
      </section>

      <section class="mb-5">
        <h3 class="fw-bold mb-4 border-start border-warning border-4 ps-2">
          Todos os itens (entidade principal)
        </h3>
        <div class="row g-4" id="grid-todos-itens"></div>
      </section>

      <section class="bg-white rounded p-4 shadow-sm border border-light mt-5">
        <h4 class="fw-bold mb-3 text-dark">Informações do(a) Aluno(a)</h4>
        <div class="row align-items-center">
          <div class="col-auto">
            <div
              class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold fs-4 shadow-sm"
              style="width: 60px; height: 60px"
            >
              AN
            </div>
          </div>
          <div class="col">
            <h5 class="mb-1 fw-bold text-dark">Alexandra Nauna</h5>
            <p class="mb-1 text-muted small">
              Curso: Sistemas de Informação | Turno: Noite
            </p>
            <p class="mb-0 text-muted small">PUC Minas - Unidade São Gabriel</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-dark text-white py-4 text-center mt-auto">
      <p class="mb-0 small text-secondary">
        &copy; 2026 - Desenvolvimento de Interfaces Web
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
