<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Brooklyn Nine-Nine - Detalhes da Temporada</title>
  </head>
  <body class="bg-light">
    <header
      class="py-3 border-bottom border-warning border-3"
      style="background-color: #002147 !important"
    >
      <div
        class="container d-flex flex-wrap align-items-center justify-content-between"
      >
        <img src="imgs/Brooklyn_Nine-Nine_Logo.png" width="130" alt="logo" />

        <ul class="nav">
          <li class="nav-item">
            <a href="index.html" class="nav-link text-white fw-bold px-3"
              >Voltar para Home</a
            >
          </li>
        </ul>
      </div>
    </header>

    <main id="container-detalhes" class="container my-5">
      <section
        class="bg-white rounded p-4 shadow-sm mb-5"
        id="info-gerais-item"
      >
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando detalhes...</span>
          </div>
          <p class="mt-2 text-muted">Buscando dados no distrito 99...</p>
        </div>
      </section>

      <section class="mb-5">
        <h4 class="fw-bold mb-4 border-start border-warning border-4 ps-2">
          Fotos do Item associado (entidade secundária)
        </h4>
        <div class="row g-3" id="fotos-associadas"></div>
      </section>
    </main>

    <footer class="bg-dark text-white py-4 text-center mt-auto">
      <p class="mb-0 small text-secondary">
        &copy; 2026 - Desenvolvimento de Interfaces Web - PUC Minas
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
